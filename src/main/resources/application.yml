server:
  port: 8080

spring:
  application:
    name: train-ticket-system

  # 1. 数据库配置 (对应 Docker mysql 容器)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:13306/train_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

  # 2. Redis 配置 (用于 StringRedisTemplate)
  data:
    redis:
      host: 127.0.0.1
      port: 16379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10
          max-wait: 3000ms

  # 3. RabbitMQ 配置 (对应 Docker rabbitmq 容器)
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: admin
    password: admin
    publisher-confirm-type: correlated # 开启消息确认
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual # 手动确认
        prefetch: 1
        concurrency: 5
        max-concurrency: 10

# 4. Redisson 配置 (对应 Docker redis 容器，用于分布式锁等高级功能)
redisson:
  address: "redis://127.0.0.1:16379"
  password: null
  database: 0

# 5. MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true # 开启下划线转驼峰

# 6. 票务系统自定义配置
train:
  # Redis缓存初始化配置
  redis:
#    auto-init: true # 是否启动时自动初始化Redis缓存
    init-start-id: 1001 # 自动初始化的起始车次ID
    init-end-id: 1010 # 自动初始化的结束车次ID

  # 令牌桶限流配置
  rate-limit:
    capacity: 100 # 令牌桶容量
    rate: 100 # 每秒补充令牌数
    total-quota: 1000 # 每个车次总配额
